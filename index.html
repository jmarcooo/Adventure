<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Heroes</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #fff;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 100%;
            max-height: 850px;
            background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* --- Top Bar (Currencies) --- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            background: rgba(0, 0, 0, 0.15);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            z-index: 10;
        }

        .currency {
            background: rgba(255, 255, 255, 0.95);
            padding: 8px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            color: #333;
        }

        /* --- Screens --- */
        .screen {
            flex-grow: 1;
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            overflow-y: auto; /* Allow scrolling if content overflows */
        }

        .screen.active { display: flex; }

        /* --- Home Screen Elements --- */
        .game-title {
            font-family: 'Fredoka One', cursive;
            font-size: 3.2rem;
            line-height: 1;
            text-shadow: 0 5px 0 #2980b9, 0 8px 10px rgba(0,0,0,0.3);
            margin-bottom: 30px;
            transform: rotate(-3deg);
        }

        .character-display {
            width: 160px; height: 160px;
            background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 70%);
            display: flex; justify-content: center; align-items: center;
            border-radius: 50%; margin-bottom: 40px;
            animation: bounce 2s infinite ease-in-out;
            position: relative;
        }

        .character-display .hero-emoji { font-size: 6rem; z-index: 2; }
        .character-display .weapon-emoji {
            font-size: 2.5rem; position: absolute;
            bottom: 20px; right: 10px; z-index: 3; transform: rotate(15deg);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* --- Hero Selection Cards --- */
        .hero-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            margin-top: 20px;
        }

        .hero-card {
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid transparent;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .hero-card:active { transform: scale(0.95); }

        .hero-card.selected {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            border-color: #f1c40f;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .hero-card .hero-icon { font-size: 3rem; }
        .hero-card .hero-info { text-align: left; }
        .hero-card h3 { margin: 0; font-size: 1.2rem; }
        .hero-card p { margin: 0; font-size: 0.9rem; opacity: 0.8; }

        /* --- Buttons --- */
        .action-btn {
            font-family: 'Fredoka One', cursive;
            background: linear-gradient(180deg, #f1c40f 0%, #f39c12 100%);
            color: white; border: none; padding: 20px 60px;
            font-size: 2.5rem; border-radius: 50px; cursor: pointer;
            box-shadow: 0 8px 0 #d35400, 0 15px 20px rgba(0,0,0,0.3);
            transition: transform 0.1s, box-shadow 0.1s;
            text-transform: uppercase; margin-top: 10px;
        }

        .action-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 #d35400, 0 5px 10px rgba(0,0,0,0.3);
        }

        .action-btn.red { background: linear-gradient(180deg, #e74c3c 0%, #c0392b 100%); box-shadow: 0 8px 0 #922b21; }
        .action-btn.red:active { box-shadow: 0 0px 0 #922b21; }

        /* --- Bottom Navigation --- */
        .bottom-nav {
            display: flex; justify-content: space-around;
            background: #fff; padding: 15px 10px 25px 10px;
            border-top-left-radius: 25px; border-top-right-radius: 25px;
            z-index: 10;
        }

        .nav-btn {
            background: none; border: none; display: flex; flex-direction: column;
            align-items: center; font-family: 'Nunito', sans-serif;
            font-size: 0.9rem; font-weight: bold; color: #95a5a6; cursor: pointer;
        }

        .nav-btn .icon { font-size: 1.8rem; margin-bottom: 5px; transition: transform 0.2s;}
        .nav-btn.active { color: #3498db; }
        .nav-btn.active .icon { transform: scale(1.2); }

        /* --- Enemy Style --- */
        .enemy { font-size: 5rem; animation: shake 0.5s infinite alternate; }
        @keyframes shake { 0% { transform: translateX(-5px); } 100% { transform: translateX(5px); } }
        .health-bar { width: 100%; height: 20px; background: #ddd; border-radius: 10px; margin-top: 20px; overflow: hidden; }
        .health-fill { width: 100%; height: 100%; background: #e74c3c; transition: width 0.2s; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="top-bar">
            <div class="currency">🪙 <span id="gold-amount">0</span></div>
            <div class="currency">💎 <span id="gem-amount">0</span></div>
        </div>

        <div id="screen-home" class="screen active">
            <h1 class="game-title">POCKET<br>HEROES</h1>
            <div class="character-display">
                <div class="hero-emoji" id="home-hero">🧑‍🎤</div>
                <div class="weapon-emoji" id="home-weapon">⚔️</div>
            </div>
            <button class="action-btn" onclick="startGame()">PLAY</button>
        </div>

        <div id="screen-heroes" class="screen" style="justify-content: flex-start;">
            <h2>Select Hero</h2>
            
            <div class="hero-list">
                <div class="hero-card selected" id="card-warrior" onclick="selectHero('warrior')">
                    <div class="hero-icon">🧑‍🎤</div>
                    <div class="hero-info">
                        <h3>Warrior</h3>
                        <p id="stat-warrior">Base Damage: 20</p>
                    </div>
                </div>

                <div class="hero-card" id="card-mage" onclick="selectHero('mage')">
                    <div class="hero-icon">🧙‍♂️</div>
                    <div class="hero-info">
                        <h3>Mage</h3>
                        <p id="stat-mage">Base Damage: 35</p>
                    </div>
                </div>

                <div class="hero-card" id="card-archer" onclick="selectHero('archer')">
                    <div class="hero-icon">🧝‍♂️</div>
                    <div class="hero-info">
                        <h3>Archer</h3>
                        <p id="stat-archer">Base Damage: 25</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="screen-gear" class="screen">
            <h2>Equipment</h2>
            <p>Upgrade your heroes' strength.</p>
            <button class="action-btn" style="font-size: 1.2rem; padding: 15px 30px;" onclick="buyUpgrade()">Upgrade Damage (100 🪙)</button>
        </div>

        <div id="screen-shop" class="screen">
            <h2>Item Shop</h2>
            <p>Coming Soon!</p>
            <div style="font-size: 4rem; margin: 20px;">🛒</div>
        </div>

        <div id="screen-game" class="screen" style="background: #2c3e50;">
            <h2 id="level-text">Level 1</h2>
            <div class="enemy" id="enemy-emoji">👾</div>
            <div class="health-bar"><div class="health-fill" id="enemy-health"></div></div>
            <button class="action-btn red" onclick="attackEnemy()" style="margin-top: 40px; font-size: 2rem;">ATTACK!</button>
            <button class="action-btn" onclick="openMenu('home')" style="font-size: 1rem; padding: 10px 20px; margin-top: 20px; background: #95a5a6; box-shadow: 0 5px 0 #7f8c8d;">Flee</button>
        </div>

        <div class="bottom-nav" id="bottom-nav-bar">
            <button class="nav-btn" id="btn-heroes" onclick="openMenu('heroes')"><span class="icon">🦸‍♂️</span>Heroes</button>
            <button class="nav-btn" id="btn-gear" onclick="openMenu('gear')"><span class="icon">🎒</span>Gear</button>
            <button class="nav-btn active" id="btn-home" onclick="openMenu('home')"><span class="icon">🏠</span>Home</button>
            <button class="nav-btn" id="btn-shop" onclick="openMenu('shop')"><span class="icon">🏪</span>Shop</button>
        </div>
    </div>

    <script>
        // --- 1. GAME DATA ---
        
        // Define our available heroes
        const heroData = {
            warrior: { id: 'warrior', emoji: '🧑‍🎤', weapon: '⚔️', baseDamage: 20 },
            mage: { id: 'mage', emoji: '🧙‍♂️', weapon: '🔮', baseDamage: 35 },
            archer: { id: 'archer', emoji: '🧝‍♂️', weapon: '🏹', baseDamage: 25 }
        };

        let player = {
            gold: 0,
            gems: 0,
            currentHero: 'warrior', // Default hero
            bonusDamage: 0 // Damage added via upgrades
        };

        let enemy = {
            maxHealth: 100,
            currentHealth: 100,
            level: 1,
            emojis: ['👾', '🧟', '🦇', '👹', '🐉']
        };

        // --- 2. HERO SELECTION LOGIC ---
        function selectHero(heroId) {
            // Update player state
            player.currentHero = heroId;

            // Remove 'selected' class from all cards
            document.querySelectorAll('.hero-card').forEach(card => {
                card.classList.remove('selected');
            });

            // Add 'selected' class to clicked card
            document.getElementById('card-' + heroId).classList.add('selected');

            // Update Home Screen graphics
            document.getElementById('home-hero').innerText = heroData[heroId].emoji;
            document.getElementById('home-weapon').innerText = heroData[heroId].weapon;
        }

        // Calculate total damage (Base hero damage + any bought upgrades)
        function getTotalDamage() {
            return heroData[player.currentHero].baseDamage + player.bonusDamage;
        }

        // --- 3. NAVIGATION LOGIC ---
        const screens = ['home', 'heroes', 'gear', 'shop', 'game'];

        function openMenu(targetScreen) {
            screens.forEach(screen => {
                document.getElementById('screen-' + screen).classList.remove('active');
            });
            document.getElementById('screen-' + targetScreen).classList.add('active');

            if(targetScreen !== 'game') {
                document.getElementById('bottom-nav-bar').style.display = 'flex';
                screens.forEach(screen => {
                    if(document.getElementById('btn-' + screen)) {
                        document.getElementById('btn-' + screen).classList.remove('active');
                    }
                });
                document.getElementById('btn-' + targetScreen).classList.add('active');
            } else {
                document.getElementById('bottom-nav-bar').style.display = 'none';
            }
        }

        function startGame() {
            openMenu('game');
            spawnEnemy();
        }

        // --- 4. CURRENCY & UI LOGIC ---
        function updateUI() {
            document.getElementById('gold-amount').innerText = player.gold;
            document.getElementById('gem-amount').innerText = player.gems;
        }

        // --- 5. COMBAT LOGIC ---
        function spawnEnemy() {
            enemy.maxHealth = 100 * enemy.level;
            enemy.currentHealth = enemy.maxHealth;
            document.getElementById('level-text').innerText = "Level " + enemy.level;
            
            let randomEmoji = enemy.emojis[Math.floor(Math.random() * enemy.emojis.length)];
            document.getElementById('enemy-emoji').innerText = randomEmoji;
            
            updateHealthBar();
        }

        function attackEnemy() {
            // Use dynamically calculated damage based on the selected hero
            enemy.currentHealth -= getTotalDamage();
            
            let enemyEl = document.getElementById('enemy-emoji');
            enemyEl.style.transform = 'scale(0.8) rotate(-10deg)';
            setTimeout(() => { enemyEl.style.transform = ''; }, 100);

            if (enemy.currentHealth <= 0) {
                enemyDefeated();
            } else {
                updateHealthBar();
            }
        }

        function updateHealthBar() {
            let percentage = (enemy.currentHealth / enemy.maxHealth) * 100;
            document.getElementById('enemy-health').style.width = percentage + '%';
        }

        function enemyDefeated() {
            let goldReward = 50 * enemy.level;
            player.gold += goldReward;
            if(Math.random() > 0.9) player.gems += 1; 

            updateUI();
            enemy.level++;
            spawnEnemy();
        }

        // --- 6. UPGRADE LOGIC ---
        function buyUpgrade() {
            if(player.gold >= 100) {
                player.gold -= 100;
                player.bonusDamage += 15; // Adds to the bonus damage pool, affecting ALL heroes
                updateUI();
                alert("Damage upgraded! Your overall damage increased by 15.");
            } else {
                alert("Not enough Gold! Go fight some monsters.");
            }
        }

        // Initialize UI on load
        updateUI();
    </script>
</body>
</html>
