<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cup Heroes Clone - Functional</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #fff;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 100%;
            max-height: 850px;
            background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* --- Top Bar (Currencies) --- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            background: rgba(0, 0, 0, 0.15);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            z-index: 10;
        }

        .currency {
            background: rgba(255, 255, 255, 0.95);
            padding: 8px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            color: #333;
        }

        /* --- Screens --- */
        .screen {
            flex-grow: 1;
            display: none; /* Hidden by default */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .screen.active {
            display: flex; /* Only the active screen shows */
        }

        /* --- Home Screen Elements --- */
        .game-title {
            font-family: 'Fredoka One', cursive;
            font-size: 3.5rem;
            line-height: 1;
            text-shadow: 0 5px 0 #2980b9, 0 8px 10px rgba(0,0,0,0.3);
            margin-bottom: 30px;
            transform: rotate(-3deg);
        }

        .character-display {
            width: 160px; height: 160px;
            background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 70%);
            display: flex; justify-content: center; align-items: center;
            border-radius: 50%;
            margin-bottom: 40px;
            animation: bounce 2s infinite ease-in-out;
            position: relative;
        }

        .character-display .hero-emoji { font-size: 6rem; z-index: 2; }
        .character-display .weapon-emoji {
            font-size: 2.5rem; position: absolute;
            bottom: 20px; right: 10px; z-index: 3; transform: rotate(15deg);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* --- Buttons --- */
        .action-btn {
            font-family: 'Fredoka One', cursive;
            background: linear-gradient(180deg, #f1c40f 0%, #f39c12 100%);
            color: white; border: none; padding: 20px 60px;
            font-size: 2.5rem; border-radius: 50px; cursor: pointer;
            box-shadow: 0 8px 0 #d35400, 0 15px 20px rgba(0,0,0,0.3);
            transition: transform 0.1s, box-shadow 0.1s;
            text-transform: uppercase; margin-top: 10px;
        }

        .action-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 #d35400, 0 5px 10px rgba(0,0,0,0.3);
        }

        .action-btn.red { background: linear-gradient(180deg, #e74c3c 0%, #c0392b 100%); box-shadow: 0 8px 0 #922b21; }
        .action-btn.red:active { box-shadow: 0 0px 0 #922b21; }

        /* --- Bottom Navigation --- */
        .bottom-nav {
            display: flex; justify-content: space-around;
            background: #fff; padding: 15px 10px 25px 10px;
            border-top-left-radius: 25px; border-top-right-radius: 25px;
            z-index: 10;
        }

        .nav-btn {
            background: none; border: none; display: flex; flex-direction: column;
            align-items: center; font-family: 'Nunito', sans-serif;
            font-size: 0.9rem; font-weight: bold; color: #95a5a6; cursor: pointer;
        }

        .nav-btn .icon { font-size: 1.8rem; margin-bottom: 5px; transition: transform 0.2s;}
        .nav-btn.active { color: #3498db; }
        .nav-btn.active .icon { transform: scale(1.2); }

        /* --- Enemy Style --- */
        .enemy { font-size: 5rem; animation: shake 0.5s infinite alternate; }
        @keyframes shake { 0% { transform: translateX(-5px); } 100% { transform: translateX(5px); } }
        .health-bar { width: 100%; height: 20px; background: #ddd; border-radius: 10px; margin-top: 20px; overflow: hidden; }
        .health-fill { width: 100%; height: 100%; background: #e74c3c; transition: width 0.2s; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="top-bar">
            <div class="currency">🪙 <span id="gold-amount">0</span></div>
            <div class="currency">💎 <span id="gem-amount">0</span></div>
        </div>

        <div id="screen-home" class="screen active">
            <h1 class="game-title">CUP<br>HEROES</h1>
            <div class="character-display">
                <div class="hero-emoji">🥤</div>
                <div class="weapon-emoji">🗡️</div>
            </div>
            <button class="action-btn" onclick="startGame()">PLAY</button>
        </div>

        <div id="screen-heroes" class="screen">
            <h2>Select Hero</h2>
            <p>Unlock new cups here!</p>
            <div style="font-size: 4rem; margin: 20px;">☕ 🍵 🍼</div>
        </div>

        <div id="screen-gear" class="screen">
            <h2>Equipment</h2>
            <p>Upgrade your weapons.</p>
            <button class="action-btn" style="font-size: 1.2rem; padding: 15px 30px;" onclick="buyUpgrade()">Upgrade Damage (100 🪙)</button>
        </div>

        <div id="screen-shop" class="screen">
            <h2>Item Shop</h2>
            <p>Buy gems and gold here.</p>
            <div style="font-size: 4rem; margin: 20px;">💰 🛒</div>
        </div>

        <div id="screen-game" class="screen" style="background: #2c3e50;">
            <h2 id="level-text">Level 1</h2>
            <div class="enemy" id="enemy-emoji">👾</div>
            <div class="health-bar"><div class="health-fill" id="enemy-health"></div></div>
            <button class="action-btn red" onclick="attackEnemy()" style="margin-top: 40px; font-size: 2rem;">ATTACK!</button>
            <button class="action-btn" onclick="openMenu('home')" style="font-size: 1rem; padding: 10px 20px; margin-top: 20px; background: #95a5a6; box-shadow: 0 5px 0 #7f8c8d;">Flee</button>
        </div>

        <div class="bottom-nav" id="bottom-nav-bar">
            <button class="nav-btn" id="btn-heroes" onclick="openMenu('heroes')"><span class="icon">🦸‍♂️</span>Heroes</button>
            <button class="nav-btn" id="btn-gear" onclick="openMenu('gear')"><span class="icon">🎒</span>Gear</button>
            <button class="nav-btn active" id="btn-home" onclick="openMenu('home')"><span class="icon">🏠</span>Home</button>
            <button class="nav-btn" id="btn-shop" onclick="openMenu('shop')"><span class="icon">🏪</span>Shop</button>
        </div>
    </div>

    <script>
        // --- 1. GAME STATE ---
        let player = {
            gold: 0,
            gems: 0,
            damage: 20
        };

        let enemy = {
            maxHealth: 100,
            currentHealth: 100,
            level: 1,
            emojis: ['👾', '🧟', '🦇', '👹', '🐉']
        };

        // --- 2. NAVIGATION LOGIC ---
        const screens = ['home', 'heroes', 'gear', 'shop', 'game'];

        function openMenu(targetScreen) {
            // Hide all screens
            screens.forEach(screen => {
                document.getElementById('screen-' + screen).classList.remove('active');
            });
            // Show target screen
            document.getElementById('screen-' + targetScreen).classList.add('active');

            // Handle bottom nav highlights
            if(targetScreen !== 'game') {
                document.getElementById('bottom-nav-bar').style.display = 'flex'; // Show nav bar
                screens.forEach(screen => {
                    if(document.getElementById('btn-' + screen)) {
                        document.getElementById('btn-' + screen).classList.remove('active');
                    }
                });
                document.getElementById('btn-' + targetScreen).classList.add('active');
            } else {
                document.getElementById('bottom-nav-bar').style.display = 'none'; // Hide nav bar during game
            }
        }

        function startGame() {
            openMenu('game');
            spawnEnemy();
        }

        // --- 3. CURRENCY LOGIC ---
        function updateUI() {
            document.getElementById('gold-amount').innerText = player.gold;
            document.getElementById('gem-amount').innerText = player.gems;
        }

        // --- 4. COMBAT LOGIC ---
        function spawnEnemy() {
            enemy.maxHealth = 100 * enemy.level;
            enemy.currentHealth = enemy.maxHealth;
            document.getElementById('level-text').innerText = "Level " + enemy.level;
            
            // Pick a random enemy emoji
            let randomEmoji = enemy.emojis[Math.floor(Math.random() * enemy.emojis.length)];
            document.getElementById('enemy-emoji').innerText = randomEmoji;
            
            updateHealthBar();
        }

        function attackEnemy() {
            enemy.currentHealth -= player.damage;
            
            // Visual feedback for attack
            let enemyEl = document.getElementById('enemy-emoji');
            enemyEl.style.transform = 'scale(0.8) rotate(-10deg)';
            setTimeout(() => { enemyEl.style.transform = ''; }, 100);

            if (enemy.currentHealth <= 0) {
                enemyDefeated();
            } else {
                updateHealthBar();
            }
        }

        function updateHealthBar() {
            let percentage = (enemy.currentHealth / enemy.maxHealth) * 100;
            document.getElementById('enemy-health').style.width = percentage + '%';
        }

        function enemyDefeated() {
            // Give rewards
            let goldReward = 50 * enemy.level;
            player.gold += goldReward;
            
            // 10% chance for a gem
            if(Math.random() > 0.9) player.gems += 1; 

            updateUI();
            
            // Next level
            enemy.level++;
            spawnEnemy();
        }

        // --- 5. UPGRADE LOGIC ---
        function buyUpgrade() {
            if(player.gold >= 100) {
                player.gold -= 100;
                player.damage += 15;
                updateUI();
                alert("Damage upgraded! You now do " + player.damage + " damage per click.");
            } else {
                alert("Not enough Gold! Go fight some monsters.");
            }
        }

        // Initialize UI on load
        updateUI();
    </script>
</body>
</html>
