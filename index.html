<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cup Heroes Clone - Home</title>
    <style>
        /* Import fun, game-style fonts */
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Center the mobile container on a desktop screen */
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Mobile Game Viewport */
        #game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 100%;
            max-height: 850px;
            background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* --- Top Bar (Currencies) --- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            background: rgba(0, 0, 0, 0.15);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        .currency {
            background: rgba(255, 255, 255, 0.95);
            padding: 8px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* --- Main Content Area --- */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .game-title {
            font-family: 'Fredoka One', cursive;
            font-size: 3.5rem;
            color: #fff;
            text-align: center;
            line-height: 1;
            text-shadow: 0 5px 0 #2980b9, 0 8px 10px rgba(0,0,0,0.3);
            margin-bottom: 30px;
            transform: rotate(-3deg);
        }

        /* Floating Hero Animation */
        .character-display {
            width: 160px;
            height: 160px;
            background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 70%);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            margin-bottom: 40px;
            animation: bounce 2s infinite ease-in-out;
            position: relative;
        }

        .character-display .hero-emoji {
            font-size: 6rem;
            z-index: 2;
        }

        .character-display .weapon-emoji {
            font-size: 2.5rem;
            position: absolute;
            bottom: 20px;
            right: 10px;
            z-index: 3;
            transform: rotate(15deg);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Big Chunky Play Button */
        .play-btn {
            font-family: 'Fredoka One', cursive;
            background: linear-gradient(180deg, #f1c40f 0%, #f39c12 100%);
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 2.5rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #d35400, 0 15px 20px rgba(0,0,0,0.3);
            transition: transform 0.1s, box-shadow 0.1s;
            text-transform: uppercase;
        }

        .play-btn:active {
            transform: translateY(8px); /* Button presses down */
            box-shadow: 0 0px 0 #d35400, 0 5px 10px rgba(0,0,0,0.3);
        }

        /* --- Bottom Navigation --- */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            background: #fff;
            padding: 15px 10px 25px 10px;
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
        }

        .nav-btn {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Nunito', sans-serif;
            font-size: 0.9rem;
            font-weight: bold;
            color: #95a5a6;
            cursor: pointer;
            transition: color 0.2s, transform 0.1s;
        }

        .nav-btn .icon {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .nav-btn:hover, .nav-btn:active, .nav-btn.active {
            color: #3498db;
        }

        .nav-btn:active {
            transform: scale(0.90);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="top-bar">
            <div class="currency">
                <span>🪙</span>
                <span id="gold-amount">1,250</span>
            </div>
            <div class="currency">
                <span>💎</span>
                <span id="gem-amount">45</span>
            </div>
        </div>

        <div class="main-content">
            <h1 class="game-title">CUP<br>HEROES</h1>
            
            <div class="character-display">
                <div class="hero-emoji">🥤</div>
                <div class="weapon-emoji">🗡️</div>
            </div>

            <button class="play-btn" onclick="startGame()">PLAY</button>
        </div>

        <div class="bottom-nav">
            <button class="nav-btn" onclick="openMenu('Heroes')">
                <span class="icon">🦸‍♂️</span>
                Heroes
            </button>
            <button class="nav-btn" onclick="openMenu('Gear')">
                <span class="icon">🎒</span>
                Gear
            </button>
            <button class="nav-btn active" onclick="openMenu('Home')">
                <span class="icon">🏠</span>
                Home
            </button>
            <button class="nav-btn" onclick="openMenu('Shop')">
                <span class="icon">🏪</span>
                Shop
            </button>
        </div>
    </div>

    <script>
        // Store player data
        let playerData = {
            gold: 1250,
            gems: 45
        };

        // Function triggered when the PLAY button is pressed
        function startGame() {
            // Add a visual flair or sound effect here later
            console.log("Starting Chapter 1...");
            alert("Loading Level 1: The Kitchen Counter...");
            
            // Here you would transition the screen to the actual game logic 
            // (e.g., hiding the home screen div and showing the canvas game loop)
        }

        // Function for navigating between tabs at the bottom
        function openMenu(menuName) {
            console.log("Navigating to: " + menuName);
            if(menuName !== 'Home') {
                alert("Opening " + menuName + " Menu!");
            }
        }

        // Future update functions for currencies
        function addGold(amount) {
            playerData.gold += amount;
            document.getElementById('gold-amount').innerText = playerData.gold.toLocaleString();
        }
    </script>
</body>
</html>
